      color: white;

    .header-content {

    .profile-logo img {

      height: 100%;
      object-fit: cover;
    }

    .brand-badge {

      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 700;

      letter-spacing: 2px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .brand-name span {
      color: var(--ml-yellow);
    }

    .brand-tagline {
      font-size: 0.95rem;
      color: #cbd5e1;
      max-width: 560px;
      margin: 0 auto;
      font-weight: 500;
    }

    .filter-section {
      padding: 0 15px;
      max-width: 1200px;
      margin: -35px auto 30px;
      position: relative;
      z-index: 10;
    }

    .search-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 4px;
      border-radius: 50px;
      box-shadow: 0 15px 40px rgba(15, 23, 42, 0.15);
      display: flex;
      align-items: center;
      border: 1px solid #e2e8f0;
    }

    #searchInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: transparent;
      color: var(--text-main);
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (min-width: 640px) {
      .container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .container {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      color: inherit;
      position: relative;
      min-height: 100%;

      background: var(--ml-yellow);
      color: #111;
      letter-spacing: 0.5px;

      background: #f8fafc;
      border: 1px solid var(--border-light);

      align-items: center;

    .product-title {

      line-height: 1.4;
      min-height: 2.8rem;

      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-desc {
      font-size: 0.85rem;

      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;

    function displayProducts(productsToDisplay) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = "";

      if (!productsToDisplay.length) {
        grid.innerHTML = "<div class='no-results'>Nenhum alvo detectado no radar... 🕵️‍♂️</div>";
        return;
      }

      productsToDisplay.forEach(product => {
        const hasLink = !!(product.link && product.link.trim());
        const ctaClass = hasLink ? "cta-button" : "cta-button disabled";
        const ctaHref = hasLink ? product.link : "#";
        const ctaText = hasLink ? "Confira a oferta no Mercado Livre" : "Link indisponível";

        const card = `
          <div class="offer-card">
            <span class="store-badge">${product.store || 'Mercado Livre'}</span>
            ${product.image ? `<div class="product-image-wrap"><img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy"></div>` : ''}
            <div class="verify-badge">
              <svg style="width:12px;height:12px" viewBox="0 0 24 24">
                <path fill="currentColor" d="M12,2L4,5V11C4,16.55 7.84,21.74 12,23C16.16,21.74 20,16.55 20,11V5L12,2M12,11.91L14.59,14.5L15.41,13.67L12,10.25L8.59,13.67L9.41,14.5L12,11.91Z"/>
              </svg>
              Oferta Verificada
            </div>
            <h2 class="product-title">${product.name}</h2>
            <p class="product-desc">${product.desc}</p>
            <div class="pricing-area">
              <div class="price-row">
                ${product.oldPrice ? `<span class="old-price">${product.oldPrice}</span>` : ''}
                ${product.newPrice ? `<span class="new-price">${product.newPrice}</span>` : ''}
              </div>
              ${product.discount ? `<span class="discount-pill">${product.discount}</span>` : ''}
            </div>
            <a href="${ctaHref}" class="${ctaClass}" target="_blank" rel="noopener noreferrer">
              ${ctaText}
            </a>
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', card);
      });
    }

    function filterProducts() {
      const searchInput = document.getElementById('searchInput');
      const searchTerm = searchInput.value.toLowerCase().trim();

      const filtered = products.filter(product =>
        (product.name || '').toLowerCase().includes(searchTerm) ||
        (product.desc || '').toLowerCase().includes(searchTerm)
      );

      displayProducts(filtered);
    }

    document.addEventListener('DOMContentLoaded', () => {
      displayProducts(products);
    });
