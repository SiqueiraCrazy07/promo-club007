    <style>
        :root {
            --primary-dark: #0f172a; /* Azul Navy Sofisticado */
            --accent-blue: #3b82f6;  /* Azul Mercado Livre */
            --danger: #ef4444;      /* Vermelho Urgência */
            --bg: #ffffff;          /* Branco Puro (Foco Total) */
            --text-main: #1e293b;
            --text-sec: #64748b;
            --ml-yellow: #fff159;
            --ml-yellow-dark: #eab308;
            --safe-green: #10b981;
            --border-light: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* CABEÇALHO PREMIUM 007 - USANDO SUAS IMAGENS */
        .header-hero {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('image_562b1f.jpg');
            background-size: cover;
            background-position: center;
            padding: 50px 20px 70px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .profile-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--ml-yellow);
            margin: 0 auto 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 241, 89, 0.3);
            background: white;
        }

        .profile-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .brand-name span { color: var(--ml-yellow); }

        .brand-tagline {
            font-size: 0.9rem;
            color: #cbd5e1;
            max-width: 500px;
            margin: 0 auto;
            font-weight: 500;
        }

        /* FILTROS E PESQUISA */
        .filter-section {
            padding: 0 15px;
            max-width: 1200px;
            margin: -35px auto 30px;
            position: relative;
            z-index: 10;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 4px;
            border-radius: 50px;
            box-shadow: 0 15px 40px rgba(15, 23, 42, 0.15);
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        #searchInput {
            flex: 1;
            padding: 12px 20px;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            color: var(--text-main);
        }

        /* GRELHA DE PRODUTOS */
        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
        }

        @media (min-width: 580px) { .container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 900px) { .container { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1200px) { .container { grid-template-columns: repeat(4, 1fr); } }

        .offer-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            position: relative;
            min-height: 280px;
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            border-color: var(--accent-blue);
        }

        .store-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            align-self: flex-start;
            background: var(--ml-yellow); 
            color: #111;
            letter-spacing: 0.5px;
        }

        .verify-badge {
            font-size: 9px;
            color: var(--safe-green);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }


        .product-image-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            line-height: 1.4;
            height: 2.8rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-desc {
            font-size: 0.8rem;
            color: var(--text-sec);
            margin-bottom: 20px;
            height: 4.8rem;
            overflow: hidden;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .pricing-area {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border-light);
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .old-price {
            font-size: 0.8rem;
            color: #94a3b8;
            text-decoration: line-through;
        }

        .new-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--danger);
        }

        .discount-pill {
            background: #fef2f2;
            color: var(--danger);
            font-size: 0.75rem;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 50px;
            margin-top: 8px;
            display: inline-block;
            border: 1px solid #fee2e2;
        }

        .cta-button {
            background: var(--primary-dark);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            text-align: center;
            margin-top: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
        }

        .offer-card:hover .cta-button {
            background: var(--accent-blue);
            transform: scale(1.02);
        }

        /* WHATSAPP */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: 0.3s;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            color: var(--text-sec);
            font-weight: 500;
        }
    </style>

        function displayProducts(productsToDisplay) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            if (productsToDisplay.length === 0) {
                grid.innerHTML = "<div class='no-results'>Nenhum alvo detetado no radar... 🕵️‍♂️</div>";
                return;
            }
            productsToDisplay.forEach(product => {
                const card = `
                    <div class="offer-card">
                        <span class="store-badge">${product.store || 'Mercado Livre'}</span>
                        <div class="product-image-wrap">
                            <img class="product-image" src="${product.image || 'https://via.placeholder.com/600x600?text=Oferta'}" alt="${product.name}">
                        </div>
                        <div class="verify-badge">

                        </div>
                        <h2 class="product-title">${product.name}</h2>
                        <p class="product-desc">${product.desc}</p>
                        <div class="pricing-area">
                            <div class="price-row">
                                ${product.oldPrice ? `<span class="old-price">${product.oldPrice}</span>` : ''}
                                <span class="new-price">${product.newPrice}</span>
                            </div>
                            ${product.discount ? `<span class="discount-pill">${product.discount}</span>` : ''}
                        </div>
                        <a href="${product.link}" class="cta-button" target="_blank" rel="noopener noreferrer">
                            Confira a oferta no Mercado Livre
                        </a>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(product => 
                product.name.toLowerCase().includes(searchTerm) || 
                product.desc.toLowerCase().includes(searchTerm)
            );
            displayProducts(filtered);
        }

        window.onload = () => displayProducts(products);
