<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promo.Club007 | Inteligência em Ofertas</title>
  <meta name="description" content="Promo.Club007 - Seu clube exclusivo de ofertas, promoções e alertas de desconto." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #0f172a;
      --accent-blue: #3b82f6;
      --danger: #ef4444;
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-sec: #64748b;
      --ml-yellow: #fff159;
      --safe-green: #10b981;
      --border-light: #e5e7eb;
      --disabled: #94a3b8;
      --chip-bg: #eef2ff;
      --chip-active: #0f172a;
      --chip-text: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    .header-hero {
      background:
        linear-gradient(rgba(15, 23, 42, 0.78), rgba(15, 23, 42, 0.86)),
        url('./assets/exclusive_deals_in_style.png');
      background-size: cover;
      background-position: center;
      padding: 28px 16px 88px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .header-content {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
    }

    .brand-badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .brand-logo {
      width: min(100%, 420px);
      max-height: 150px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.22));
    }

    .brand-tagline {
      font-size: 0.95rem;
      color: #dbe4ef;
      max-width: 620px;
      margin: 0 auto;
      font-weight: 500;
    }

    .control-panel {
      max-width: 1200px;
      margin: -56px auto 24px;
      padding: 0 14px;
      position: relative;
      z-index: 10;
    }

    .panel-card {
      background: rgba(255,255,255,0.96);
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      padding: 14px;
    }

    .search-container {
      display: flex;
      align-items: center;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
      margin-bottom: 12px;
      padding: 0 12px;
    }

    #searchInput {
      width: 100%;
      padding: 14px 8px;
      border: none;
      outline: none;
      font-size: 0.98rem;
      background: transparent;
      color: var(--text-main);
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-tab {
      border: 1px solid #dbe3ee;
      background: var(--chip-bg);
      color: var(--chip-text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .filter-tab.active {
      background: var(--chip-active);
      color: white;
      border-color: var(--chip-active);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.14);
    }

    .results-meta {
      max-width: 1200px;
      margin: 0 auto 8px;
      padding: 0 20px;
      color: var(--text-sec);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 14px 90px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
    }

    @media (min-width: 700px) {
      .container {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
    }

    @media (min-width: 1080px) {
      .container {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }
    }

    .offer-card {
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      border: 1px solid var(--border-light);
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      color: inherit;
      min-height: 100%;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .offer-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 35px rgba(15, 23, 42, 0.10);
      border-color: #cbd5e1;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .store-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      background: var(--ml-yellow);
      color: #111;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .verify-badge {
      font-size: 9px;
      color: var(--safe-green);
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .product-image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #f8fafc;
      border: 1px solid var(--border-light);
      margin-bottom: 10px;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-title {
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.35;
      min-height: 2.45rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-desc {
      font-size: 0.77rem;
      color: var(--text-sec);
      margin-bottom: 12px;
      min-height: 3.4rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pricing-area {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .old-price {
      font-size: 0.75rem;
      color: #94a3b8;
      text-decoration: line-through;
    }

    .new-price {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--danger);
    }

    .discount-pill {
      background: #fef2f2;
      color: var(--danger);
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      margin-top: 7px;
      display: inline-block;
      border: 1px solid #fee2e2;
    }

    .cta-button {
      background: var(--primary-dark);
      color: white;
      padding: 11px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.7rem;
      text-transform: uppercase;
      text-align: center;
      margin-top: 14px;
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      text-decoration: none;
      min-height: 42px;
    }

    .cta-button:hover {
      background: var(--accent-blue);
    }

    .cta-button.disabled {
      background: var(--disabled);
      cursor: not-allowed;
      pointer-events: none;
    }

    .instagram-float {
      position: fixed;
      bottom: 98px;
      right: 18px;
      background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
      color: white;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(221, 42, 123, 0.35);
      z-index: 1000;
      transition: 0.25s;
      text-decoration: none;
    }

    .whatsapp-float {
      position: fixed;
      bottom: 28px;
      right: 18px;
      background: #25d366;
      color: white;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
      z-index: 1000;
      transition: 0.25s;
      text-decoration: none;
    }

    .instagram-float:hover,
    .whatsapp-float:hover {
      transform: translateY(-4px) scale(1.04);
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 70px 20px;
      color: var(--text-sec);
      font-weight: 600;
      background: white;
      border-radius: 20px;
      border: 1px solid var(--border-light);
    }

    @media (max-width: 480px) {
      .header-hero {
        padding: 22px 12px 82px;
      }

      .brand-logo {
        width: min(100%, 320px);
        max-height: 110px;
      }

      .brand-tagline {
        font-size: 0.85rem;
      }

      .panel-card {
        padding: 12px;
        border-radius: 18px;
      }

      .container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .offer-card {
        padding: 10px;
        border-radius: 16px;
      }

      .product-title {
        font-size: 0.85rem;
        min-height: 2.25rem;
      }

      .product-desc {
        font-size: 0.72rem;
        min-height: 3rem;
      }

      .new-price {
        font-size: 1rem;
      }

      .filter-tab {
        font-size: 0.82rem;
        padding: 9px 12px;
      }
    }
  </style>
</head>

    let activeStore = 'all';

    function normalizeStore(store) {
      return (store || '').toLowerCase().trim();
    }

    function getFilteredProducts() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      return products.filter(product => {
        const matchesStore = activeStore === 'all'
          ? true
          : normalizeStore(product.store) === normalizeStore(activeStore);

        const matchesSearch =
          (product.name || '').toLowerCase().includes(term) ||
          (product.desc || '').toLowerCase().includes(term) ||
          (product.store || '').toLowerCase().includes(term);

        return matchesStore && matchesSearch;
      });
    }

    function updateMeta(count) {
      const label = activeStore === 'all' ? 'todas as lojas' : activeStore;
      document.getElementById('resultsMeta').textContent = `${count} oferta(s) encontrada(s) em ${label}`;
    }

    function displayProducts(productsToDisplay) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = "";

      if (!productsToDisplay.length) {
        grid.innerHTML = "<div class='no-results'>Nenhum produto encontrado para esse filtro.</div>";
        updateMeta(0);
        return;
      }

      productsToDisplay.forEach(product => {
        const hasLink = !!(product.link && product.link.trim());
        const ctaClass = hasLink ? "cta-button" : "cta-button disabled";
        const ctaHref = hasLink ? product.link : "#";
        const ctaText = hasLink ? "Ver oferta" : "Link indisponível";

        const card = `
          <div class="offer-card">
            <div class="card-top">
              <span class="store-badge">${product.store || 'Loja'}</span>
              <div class="verify-badge">
                <svg style="width:11px;height:11px" viewBox="0 0 24 24">
                  <path fill="currentColor" d="M12,2L4,5V11C4,16.55 7.84,21.74 12,23C16.16,21.74 20,16.55 20,11V5L12,2M12,11.91L14.59,14.5L15.41,13.67L12,10.25L8.59,13.67L9.41,14.5L12,11.91Z"/>
                </svg>
                Verificada
              </div>
            </div>

            ${product.image ? `<div class="product-image-wrap"><img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy"></div>` : ''}

            <h2 class="product-title">${product.name}</h2>
            <p class="product-desc">${product.desc}</p>

            <div class="pricing-area">
              <div class="price-row">
                ${product.oldPrice ? `<span class="old-price">${product.oldPrice}</span>` : ''}
                ${product.newPrice ? `<span class="new-price">${product.newPrice}</span>` : ''}
              </div>
              ${product.discount ? `<span class="discount-pill">${product.discount}</span>` : ''}
            </div>

            <a href="${ctaHref}" class="${ctaClass}" target="_blank" rel="noopener noreferrer">
              ${ctaText}
            </a>
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', card);
      });

      updateMeta(productsToDisplay.length);
    }

    function refreshView() {
      displayProducts(getFilteredProducts());
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').addEventListener('input', refreshView);

      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeStore = tab.dataset.store;
          refreshView();
        });
      });

      refreshView();
    });
  </script>
